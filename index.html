<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Pilas Galvánicas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animaciones para los electrones */
        @keyframes flowRight {
            from { stroke-dashoffset: 24; }
            to { stroke-dashoffset: 0; }
        }
        @keyframes flowLeft {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: 24; }
        }
        .electron-flow-right {
            stroke-dasharray: 12;
            animation: flowRight 0.8s linear infinite;
        }
        .electron-flow-left {
            stroke-dasharray: 12;
            animation: flowLeft 0.8s linear infinite;
        }

        /* Animaciones para flechas de reacción */
        @keyframes flowDashes {
            to { stroke-dashoffset: -16; }
        }
        .reaction-arrow-red {
            stroke-dasharray: 4;
            animation: flowDashes 1s linear infinite;
            stroke: #ef4444;
        }
        .reaction-arrow-blue {
            stroke-dasharray: 4;
            animation: flowDashes 1s linear infinite;
            stroke: #3b82f6;
        }

        /* Estilos generales de transición */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
	.licencia-bloque { 
    flex-basis: 100%; /* Esto obliga a que ocupe todo el ancho y baje */
    margin-top: 25px; 
    background: #f1f5f9; 
    color: #475569; 
    font-size: 11px; 
    text-align: center; 
    border-radius: 8px; 
    padding: 12px; 
    border: 1px solid #e2e8f0;
    line-height: 1.6;
    font-family: sans-serif;
    clear: both; /* Por si acaso hay elementos flotantes */
}
.licencia-bloque a { color: #2563eb; text-decoration: none; font-weight: bold; }
.licencia-bloque a:hover { text-decoration: underline; }
.badge-container { 
    margin-bottom: 8px; 
    display: flex;          /* Usamos flexbox para centrar contenido */
    justify-content: center; /* Centra horizontalmente */
    align-items: center;    /* Centra verticalmente */
}

.badge-container img {
    display: block;
    margin: 0 auto;         /* Refuerzo de centrado para la imagen */
}
    </style>
</head>
<body class="bg-slate-200 min-h-screen font-sans text-slate-800 p-2 md:p-4 flex justify-center items-start">

    <!-- Contenedor Principal Ajustado a la nueva distribución -->
    <div class="max-w-7xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col">
        
        <!-- Cabecera Común (Espaciado Reducido) -->
        <div class="bg-blue-800 text-white py-3 px-4 text-center">
            <h1 class="text-2xl font-bold">Pilas Galvánicas</h1>
        </div>

        <!-- Layout Dividido (1/3 Izquierda, 2/3 Derecha) -->
        <div class="flex flex-col lg:flex-row w-full">
            
            <!-- BLOQUE IZQUIERDO (1/3) con espacios reducidos -->
            <div class="w-full lg:w-1/3 bg-slate-50 p-4 border-b lg:border-b-0 lg:border-r border-slate-200 flex flex-col gap-4">
                
                <!-- Botón Generar Pila -->
                <button onclick="generateRandomCell()" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow transition-colors flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Generar Nueva Pila
                </button>

                <!-- Potenciales de Reducción -->
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-2 border-b border-slate-100 pb-1 flex items-center gap-2 text-sm">
                        <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Potenciales de Reducción
                    </h3>
                    <div id="potentials-banner" class="flex flex-col gap-1 font-mono text-sm">
                        <!-- Se rellena por JS -->
                    </div>
                </div>

                <!-- Panel de Pasos -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col flex-grow">
                    <h2 id="step-title" class="text-lg font-bold text-blue-800 mb-2 border-b border-blue-100 pb-1">Paso 0: Planteamiento Inicial</h2>
                    <!-- TEXTO ALINEADO A LA IZQUIERDA -->
                    <p id="step-description" class="text-slate-600 flex-grow text-left leading-relaxed mb-4 text-sm">
                        <!-- El texto se actualizará aquí -->
                    </p>
                    <div class="flex flex-col gap-2 mt-auto">
                        <button id="btn-next" onclick="nextStep()" class="w-full py-2.5 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow-md transition-transform transform hover:scale-[1.02] flex justify-center items-center gap-2 text-sm">
                            <span id="btn-next-text">Paso 1: Identificación de Ánodo y Cátodo</span> 
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        </button>
                        <button id="btn-reset" onclick="resetSteps()" class="w-full py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold rounded-lg shadow-sm transition-colors hidden text-sm">
                            Reiniciar Simulación
                        </button>
                    </div>
                </div>
            </div>

            <!-- BLOQUE DERECHO (2/3) -->
            <div class="w-full lg:w-2/3 p-4 flex flex-col justify-between gap-2 bg-white relative">
                
                <!-- Área de Simulación Visual (SVG) -->
                <div class="w-full flex justify-center pb-0">
                    <div id="svg-container" class="relative w-full max-w-[800px] aspect-[2/1]">
                        <!-- El SVG se genera dinámicamente aquí -->
                    </div>
                </div>

                <!-- Panel de Semirreacciones PEGADO debajo de cada semielemento -->
                <div class="grid grid-cols-2 gap-2 lg:gap-4 w-full max-w-[800px] mx-auto mt-[-10px] z-10 relative">
                    <!-- Semirreacción Izquierda -->
                    <div id="reaction-left" class="bg-blue-50 p-2 lg:p-3 rounded-lg border border-blue-100 opacity-0 transition-opacity duration-500 flex flex-col justify-center items-center text-center">
                        <h3 class="font-bold text-blue-800 mb-1 text-xs uppercase tracking-wider">Cubeta Izquierda</h3>
                        <div id="equation-left" class="text-sm lg:text-base font-mono"></div>
                    </div>

                    <!-- Semirreacción Derecha -->
                    <div id="reaction-right" class="bg-blue-50 p-2 lg:p-3 rounded-lg border border-blue-100 opacity-0 transition-opacity duration-500 flex flex-col justify-center items-center text-center">
                        <h3 class="font-bold text-blue-800 mb-1 text-xs uppercase tracking-wider">Cubeta Derecha</h3>
                        <div id="equation-right" class="text-sm lg:text-base font-mono"></div>
                    </div>
                </div>

                <!-- Panel de Reacción Global y Potencial -->
                <div id="global-panel" class="bg-slate-800 text-white p-4 lg:p-5 rounded-xl shadow-inner hidden mt-2">
                    <h3 class="font-bold text-lg mb-3 text-center text-green-400">Reacción Global y Cálculo de Potencial</h3>
                    <div class="flex flex-col md:flex-row justify-around items-stretch gap-4 font-mono">
                        <div class="bg-slate-700 p-3 rounded-lg text-center w-full md:w-1/2 flex flex-col justify-center">
                            <p class="text-slate-300 text-xs mb-2">Ecuación iónica global (ajustada)</p>
                            <div id="global-equation" class="font-bold text-yellow-300 text-base lg:text-lg"></div>
                        </div>
                        <div class="bg-slate-700 p-3 rounded-lg text-center w-full md:w-1/2 flex flex-col justify-center">
                            <p class="text-slate-300 text-xs mb-2">Fuerza Electromotriz (f.e.m.)</p>
                            <div id="voltage-calculation" class="text-sm lg:text-base"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
	<div class="licencia-bloque">
            <div class="badge-container">
                <img src="https://visitor-badge.laobi.icu/badge?page_id=EAG1964.phychem.lab&left_text=Visitas&left_color=gray&right_color=blue" alt="Visitas">
            </div>
            <p style="margin: 0;">
                Autor: <strong>EAG1964</strong> | 2026 | 
                <a href="https://EAG1964.github.io/">Panel Principal</a> | 
                <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.es" target="_blank">Licencia CC BY-NC-SA 4.0</a>
            </p>
        </div>
    </div>

    <script>
        // --- DATOS QUÍMICOS ---
        const REDOX_PAIRS = [
            { id: 'Mg', ox: 'Mg<sup>2+</sup>', red: 'Mg', e0: -2.37, e: 2, color: '#D0D0D0', type: 'solid' },
            { id: 'Al', ox: 'Al<sup>3+</sup>', red: 'Al', e0: -1.66, e: 3, color: '#B0C4DE', type: 'solid' },
            { id: 'Zn', ox: 'Zn<sup>2+</sup>', red: 'Zn', e0: -0.76, e: 2, color: '#A9A9A9', type: 'solid' },
            { id: 'Cr', ox: 'Cr<sup>3+</sup>', red: 'Cr', e0: -0.74, e: 3, color: '#7F8C8D', type: 'solid' },
            { id: 'Fe', ox: 'Fe<sup>2+</sup>', red: 'Fe', e0: -0.44, e: 2, color: '#778899', type: 'solid' },
            { id: 'Cd', ox: 'Cd<sup>2+</sup>', red: 'Cd', e0: -0.40, e: 2, color: '#B0B0B0', type: 'solid' },
            { id: 'Ni', ox: 'Ni<sup>2+</sup>', red: 'Ni', e0: -0.25, e: 2, color: '#8F9779', type: 'solid' },
            { id: 'Sn', ox: 'Sn<sup>2+</sup>', red: 'Sn', e0: -0.14, e: 2, color: '#708090', type: 'solid' },
            { id: 'Pb', ox: 'Pb<sup>2+</sup>', red: 'Pb', e0: -0.13, e: 2, color: '#696969', type: 'solid' },
            { id: 'H2', ox: 'H<sup>+</sup>', red: 'H<sub>2</sub>', e0: 0.00, e: 2, color: '#E5E4E2', type: 'gas', electrode: 'Pt', complex: true, gasLabel: 'H₂',
              red_reactants: [{c: 2, s: 'H<sup>+</sup>'}], red_products: [{c: 1, s: 'H<sub>2</sub>'}],
              ox_reactants: [{c: 1, s: 'H<sub>2</sub>'}], ox_products: [{c: 2, s: 'H<sup>+</sup>'}]
            },
            { id: 'Cl2', ox: 'Cl<sub>2</sub>', red: 'Cl<sup>-</sup>', e0: 1.36, e: 2, color: '#9ACD32', type: 'gas', electrode: 'Pt', complex: true, gasLabel: 'Cl₂',
              red_reactants: [{c: 1, s: 'Cl<sub>2</sub>'}], red_products: [{c: 2, s: 'Cl<sup>-</sup>'}],
              ox_reactants: [{c: 2, s: 'Cl<sup>-</sup>'}], ox_products: [{c: 1, s: 'Cl<sub>2</sub>'}]
            },
            { id: 'O2', ox: 'O<sub>2</sub>', red: 'H<sub>2</sub>O', e0: 1.23, e: 4, color: '#E0F7FA', type: 'gas', electrode: 'Pt', complex: true, gasLabel: 'O₂',
              red_reactants: [{c: 1, s: 'O<sub>2</sub>'}, {c: 4, s: 'H<sup>+</sup>'}],
              red_products: [{c: 2, s: 'H<sub>2</sub>O'}],
              ox_reactants: [{c: 2, s: 'H<sub>2</sub>O'}],
              ox_products: [{c: 1, s: 'O<sub>2</sub>'}, {c: 4, s: 'H<sup>+</sup>'}]
            },
            { id: 'Br2', ox: 'Br<sub>2</sub>', red: 'Br<sup>-</sup>', e0: 1.07, e: 2, color: '#B22222', type: 'aqueous', electrode: 'Pt', complex: true,
              red_reactants: [{c: 1, s: 'Br<sub>2</sub>'}], red_products: [{c: 2, s: 'Br<sup>-</sup>'}],
              ox_reactants: [{c: 2, s: 'Br<sup>-</sup>'}], ox_products: [{c: 1, s: 'Br<sub>2</sub>'}]
            },
            { id: 'Cu', ox: 'Cu<sup>2+</sup>', red: 'Cu', e0: 0.34, e: 2, color: '#B87333', type: 'solid' },
            { id: 'Fe3+/Fe2+', ox: 'Fe<sup>3+</sup>', red: 'Fe<sup>2+</sup>', e0: 0.77, e: 1, color: '#F4A460', type: 'aqueous', electrode: 'Pt' },
            { id: 'Ag', ox: 'Ag<sup>+</sup>', red: 'Ag', e0: 0.80, e: 1, color: '#C0C0C0', type: 'solid' },
            { id: 'Au', ox: 'Au<sup>3+</sup>', red: 'Au', e0: 1.50, e: 3, color: '#FFD700', type: 'solid' },
            { id: 'Cr2O7/Cr3+', ox: 'Cr<sub>2</sub>O<sub>7</sub><sup>2-</sup>', red: 'Cr<sup>3+</sup>', e0: 1.33, e: 6, color: '#FF8C00', type: 'aqueous', electrode: 'Pt', complex: true,
              red_reactants: [{c: 1, s: 'Cr<sub>2</sub>O<sub>7</sub><sup>2-</sup>'}, {c: 14, s: 'H<sup>+</sup>'}],
              red_products: [{c: 2, s: 'Cr<sup>3+</sup>'}, {c: 7, s: 'H<sub>2</sub>O'}],
              ox_reactants: [{c: 2, s: 'Cr<sup>3+</sup>'}, {c: 7, s: 'H<sub>2</sub>O'}],
              ox_products: [{c: 1, s: 'Cr<sub>2</sub>O<sub>7</sub><sup>2-</sup>'}, {c: 14, s: 'H<sup>+</sup>'}]
            },
            { id: 'MnO4-/Mn2+', ox: 'MnO<sub>4</sub><sup>-</sup>', red: 'Mn<sup>2+</sup>', e0: 1.51, e: 5, color: '#8A2BE2', type: 'aqueous', electrode: 'Pt', complex: true,
              red_reactants: [{c: 1, s: 'MnO<sub>4</sub><sup>-</sup>'}, {c: 8, s: 'H<sup>+</sup>'}],
              red_products: [{c: 1, s: 'Mn<sup>2+</sup>'}, {c: 4, s: 'H<sub>2</sub>O'}],
              ox_reactants: [{c: 1, s: 'Mn<sup>2+</sup>'}, {c: 4, s: 'H<sub>2</sub>O'}],
              ox_products: [{c: 1, s: 'MnO<sub>4</sub><sup>-</sup>'}, {c: 8, s: 'H<sup>+</sup>'}]
            }
        ];

        // Autocompletar la estructura de reactivos/productos para elementos simples
        REDOX_PAIRS.forEach(p => {
            if(!p.complex) {
                p.red_reactants = [{c: 1, s: p.ox}];
                p.red_products = [{c: 1, s: p.red}];
                p.ox_reactants = [{c: 1, s: p.red}];
                p.ox_products = [{c: 1, s: p.ox}];
            }
        });

        // Matemáticas para ajuste estequiométrico
        const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
        const lcm = (a, b) => (a * b) / gcd(a, b);

        // Sales para el puente salino
        const SALT_BRIDGES = [
            { name: 'KNO₃', cation: 'K⁺', anion: 'NO₃⁻' },
            { name: 'KCl', cation: 'K⁺', anion: 'Cl⁻' },
            { name: 'NaCl', cation: 'Na⁺', anion: 'Cl⁻' },
            { name: 'NaNO₃', cation: 'Na⁺', anion: 'NO₃⁻' },
            { name: 'NH₄NO₃', cation: 'NH₄⁺', anion: 'NO₃⁻' }
        ];

        // Estado Global
        let currentCell = null;
        let step = 0;
        const MAX_STEPS = 6;

        const STEPS_INFO = [
            { title: "Paso 0: Planteamiento Inicial", btnText: "Paso 1: Identificación de Ánodo y Cátodo", desc: "Observa los potenciales de reducción. El electrodo con menor potencial de reducción tenderá a oxidarse (Ánodo) y el de mayor potencial tenderá a reducirse (Cátodo)." },
            { title: "Paso 1: Identificación de Ánodo y Cátodo", btnText: "Paso 2: Circuito Externo (Electrones)", desc: "El Ánodo (-) es donde ocurre la oxidación (menor E&deg;). El Cátodo (+) es donde ocurre la reducción (mayor E&deg;)." },
            { title: "Paso 2: Circuito Externo (Electrones)", btnText: "Paso 3: Puente Salino", desc: "Los electrones (e⁻) viajan espontáneamente desde el ánodo (polo negativo) hacia el cátodo (polo positivo) a través del cable externo." },
            { title: "Paso 3: Puente Salino", btnText: "Paso 4: Semirreacciones", desc: "(Equilibrio Iónico) Para mantener la neutralidad eléctrica, los aniones (NO₃⁻) viajan hacia el ánodo y los cationes (K⁺) hacia el cátodo." },
            { title: "Paso 4: Semirreacciones", btnText: "Paso 5: Ajuste de Reacción Global", desc: "Se plantean las semirreacciones de oxidación (ánodo) y reducción (cátodo). Nota cómo la reacción del ánodo se invierte respecto a la tabla." },
            { title: "Paso 5: Ajuste de Reacción Global", btnText: "Paso 6: Cálculo de la F.E.M. de la pila", desc: "Multiplicamos las semirreacciones para igualar el número de electrones intercambiados. Si hay H⁺ o H₂O en ambos lados, se simplifican." },
            { title: "Paso 6: Cálculo de la F.E.M. de la pila", btnText: "Completado", desc: "Calculamos el potencial de la celda mediante: E&deg;<sub>pila</sub> = E&deg;(cátodo) - E&deg;(ánodo). ¡Debe ser positivo para ser espontánea!" }
        ];

        // Inicialización
        function init() {
            generateRandomCell();
        }

        function generateRandomCell() {
            let idx1 = Math.floor(Math.random() * REDOX_PAIRS.length);
            let idx2;
            do {
                idx2 = Math.floor(Math.random() * REDOX_PAIRS.length);
            } while (idx1 === idx2);

            const p1 = REDOX_PAIRS[idx1];
            const p2 = REDOX_PAIRS[idx2];

            let anode, cathode;
            if (p1.e0 < p2.e0) { anode = p1; cathode = p2; } 
            else { anode = p2; cathode = p1; }

            // Asignar aleatoriamente izquierda/derecha
            const isAnodeLeft = Math.random() > 0.5;
            const saltBridge = SALT_BRIDGES[Math.floor(Math.random() * SALT_BRIDGES.length)];
            
            currentCell = {
                left: isAnodeLeft ? anode : cathode,
                right: isAnodeLeft ? cathode : anode,
                anode: anode,
                cathode: cathode,
                isAnodeLeft: isAnodeLeft,
                eCell: (cathode.e0 - anode.e0).toFixed(2),
                electrons: lcm(anode.e, cathode.e),
                saltBridge: saltBridge
            };
            currentCell.anodeMult = currentCell.electrons / anode.e;
            currentCell.cathodeMult = currentCell.electrons / cathode.e;

            resetSteps();
        }

        function resetSteps() {
            step = 0;
            updateUI();
        }

        function nextStep() {
            if (step < MAX_STEPS) {
                step++;
                updateUI();
            }
        }

        function updateUI() {
            // Actualizar Potenciales
            const fmtE0 = (val) => val > 0 ? `+${val}` : val;
            document.getElementById('potentials-banner').innerHTML = `
                <div class="py-1 border-b border-slate-100">E&deg;(${currentCell.left.ox}/${currentCell.left.red}) = <span class="font-bold text-blue-700">${fmtE0(currentCell.left.e0)} V</span></div>
                <div class="py-1">E&deg;(${currentCell.right.ox}/${currentCell.right.red}) = <span class="font-bold text-blue-700">${fmtE0(currentCell.right.e0)} V</span></div>
            `;

            // Textos del paso
            document.getElementById('step-title').textContent = STEPS_INFO[step].title;
            
            let desc = STEPS_INFO[step].desc;
            if (step === 3 && currentCell) {
                desc = `(Equilibrio Iónico) Para mantener la neutralidad eléctrica, los aniones (${currentCell.saltBridge.anion}) viajan hacia el ánodo y los cationes (${currentCell.saltBridge.cation}) hacia el cátodo.`;
            }
            document.getElementById('step-description').innerHTML = desc;

            // Botones
            const btnNext = document.getElementById('btn-next');
            const btnReset = document.getElementById('btn-reset');
            
            if (step === MAX_STEPS) {
                btnNext.classList.add('hidden');
                btnReset.classList.remove('hidden');
            } else {
                btnNext.classList.remove('hidden');
                document.getElementById('btn-next-text').textContent = STEPS_INFO[step].btnText;
                btnReset.classList.add('hidden');
                if (step > 0) btnReset.classList.remove('hidden');
            }

            // Actualizar Paneles de Reacciones
            updateReactionsPanel();
            
            // Dibujar SVG
            renderSVG();
        }

        function updateReactionsPanel() {
            const leftPanel = document.getElementById('reaction-left');
            const rightPanel = document.getElementById('reaction-right');
            const eqLeft = document.getElementById('equation-left');
            const eqRight = document.getElementById('equation-right');
            const globalPanel = document.getElementById('global-panel');
            const globalEq = document.getElementById('global-equation');
            const voltCalc = document.getElementById('voltage-calculation');

            if (step >= 4) {
                leftPanel.style.opacity = '1';
                rightPanel.style.opacity = '1';

                const formatSide = (parts, multiplier) => {
                    return parts.map(p => {
                        const totalC = p.c * multiplier;
                        const coeffStr = totalC === 1 ? '' : totalC;
                        return `${coeffStr}${p.s}`;
                    }).join(' + ');
                };

                const formatEq = (element, isAnode, mult) => {
                    const m = (step >= 5 && mult > 1) ? mult : 1;
                    const eTotal = (step >= 5) ? element.e * mult : element.e;
                    
                    let rxn = '';
                    if (isAnode) { // Oxidación
                        const reacts = formatSide(element.ox_reactants, m);
                        const prods = formatSide(element.ox_products, m);
                        rxn = `<span class="text-red-600 font-bold block mb-1">Oxidación (Ánodo):</span> ${reacts} &rarr; ${prods} + ${eTotal}e<sup>&minus;</sup>`;
                    } else { // Reducción
                        const reacts = formatSide(element.red_reactants, m);
                        const prods = formatSide(element.red_products, m);
                        rxn = `<span class="text-blue-600 font-bold block mb-1">Reducción (Cátodo):</span> ${reacts} + ${eTotal}e<sup>&minus;</sup> &rarr; ${prods}`;
                    }
                    return rxn;
                };

                eqLeft.innerHTML = formatEq(currentCell.left, currentCell.isAnodeLeft, currentCell.isAnodeLeft ? currentCell.anodeMult : currentCell.cathodeMult);
                eqRight.innerHTML = formatEq(currentCell.right, !currentCell.isAnodeLeft, !currentCell.isAnodeLeft ? currentCell.anodeMult : currentCell.cathodeMult);
            } else {
                leftPanel.style.opacity = '0';
                rightPanel.style.opacity = '0';
            }

            if (step >= 5) {
                globalPanel.classList.remove('hidden');
                globalPanel.classList.add('fade-in');
                
                // Mapear especies químicas para cancelarlas correctamente (ej: H+ y H2O en ambos lados)
                const getSide = (parts, mult) => parts.map(p => ({ s: p.s, c: p.c * mult }));
                
                const anodeR = getSide(currentCell.anode.ox_reactants, currentCell.anodeMult);
                const cathodeR = getSide(currentCell.cathode.red_reactants, currentCell.cathodeMult);
                const anodeP = getSide(currentCell.anode.ox_products, currentCell.anodeMult);
                const cathodeP = getSide(currentCell.cathode.red_products, currentCell.cathodeMult);

                const reactsMap = new Map();
                const prodsMap = new Map();
                
                [...anodeR, ...cathodeR].forEach(p => reactsMap.set(p.s, (reactsMap.get(p.s) || 0) + p.c));
                [...anodeP, ...cathodeP].forEach(p => prodsMap.set(p.s, (prodsMap.get(p.s) || 0) + p.c));

                // Lógica de simplificación química
                for (let [s, c] of reactsMap.entries()) {
                    if (prodsMap.has(s)) {
                        let cProd = prodsMap.get(s);
                        if (c > cProd) {
                            reactsMap.set(s, c - cProd);
                            prodsMap.delete(s);
                        } else if (c < cProd) {
                            prodsMap.set(s, cProd - c);
                            reactsMap.delete(s);
                        } else {
                            reactsMap.delete(s);
                            prodsMap.delete(s);
                        }
                    }
                }

                const formatMap = (map) => Array.from(map.entries()).map(([s, c]) => `${c === 1 ? '' : c}${s}`).join(' + ');
                
                globalEq.innerHTML = `${formatMap(reactsMap)} &rarr; ${formatMap(prodsMap)}`;
            } else {
                globalPanel.classList.add('hidden');
            }

            if (step >= 6) {
                const fmt = (v) => v > 0 ? `+${v}` : v;
                voltCalc.innerHTML = `
                    <div class="mb-1 text-slate-400">E&deg;<sub>pila</sub> = E&deg;(cátodo) - E&deg;(ánodo)</div>
                    <div class="mb-1">E&deg;<sub>pila</sub> = (${fmt(currentCell.cathode.e0)}) - (${fmt(currentCell.anode.e0)})</div>
                    <div class="text-xl text-green-400 font-bold mt-1">E&deg;<sub>pila</sub> = +${currentCell.eCell} V</div>
                `;
            } else {
                voltCalc.innerHTML = `<span class="text-slate-400 italic">Haz clic en Siguiente para calcular...</span>`;
            }
        }

        function renderSVG() {
            const { left, right, isAnodeLeft, eCell } = currentCell;

            // Variables de dibujo
            const voltmeterReading = step >= 2 ? `+${eCell} V` : `0.00 V`;
            const vColor = step >= 2 ? '#22c55e' : '#94a3b8';

            // Animaciones
            const electronClass = isAnodeLeft ? 'electron-flow-right' : 'electron-flow-left';

            // Helper para texto en la solución de acuosos
            const renderSolutionText = (element, cx) => {
                const fmtIon = (ion) => ion.replace(/<sup>/g, '<tspan dy="-10" font-size="14">').replace(/<\/sup>/g, '</tspan><tspan dy="10">').replace(/<sub>/g, '<tspan dy="10" font-size="14">').replace(/<\/sub>/g, '</tspan><tspan dy="-10">');

                if (element.type === 'aqueous') {
                    // Iones separados a la izquierda y derecha del electrodo de Pt
                    return `
                        <text x="${cx - 45}" y="280" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">${fmtIon(element.ox)}</text>
                        <text x="${cx + 45}" y="280" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">${fmtIon(element.red)}</text>
                    `;
                } else if (element.type === 'gas') {
                    // Identificamos cuál de las dos especies es el ion (tiene <sup>) para dibujarlo en el líquido
                    const ion = element.ox.includes('<sup') ? element.ox : element.red;
                    return `
                        <text x="${cx}" y="280" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">${fmtIon(ion)}</text>
                    `;
                } else {
                    return `
                        <text x="${cx}" y="280" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">${fmtIon(element.ox)}</text>
                    `;
                }
            };

            const getLiquidColor = (element) => element.type === 'aqueous' ? element.color : '#bae6fd';
            const getLiquidOpacity = (element) => element.type === 'aqueous' ? '0.35' : '0.5';

            // Dibujo de electrodos
            const renderElectrode = (element, cx, isLeftCell) => {
                if (element.type === 'gas') {
                    const dSign = isLeftCell ? -1 : 1;
                    const tubeOuterX = cx + dSign * 55;
                    const wallX = cx + dSign * 22;
                    const oppWallX = cx - dSign * 22;
                    const tubeTopY = 138;
                    const tubeBotY = 150;
                    const tubeMidY = 144;

                    const fillPath = isLeftCell
                        ? `M ${cx - 22} 130 A 22 22 0 0 1 ${cx + 22} 130 L ${cx + 22} 240 L ${cx - 22} 240 L ${cx - 22} ${tubeBotY} L ${tubeOuterX} ${tubeBotY} L ${tubeOuterX} ${tubeTopY} L ${cx - 22} ${tubeTopY} Z`
                        : `M ${cx - 22} 130 A 22 22 0 0 1 ${cx + 22} 130 L ${cx + 22} ${tubeTopY} L ${tubeOuterX} ${tubeTopY} L ${tubeOuterX} ${tubeBotY} L ${cx + 22} ${tubeBotY} L ${cx + 22} 240 L ${cx - 22} 240 Z`;

                    return `
                        <!-- Cúpula y pared recta opuesta a la entrada lateral -->
                        <path d="M ${cx - 22} 130 A 22 22 0 0 1 ${cx + 22} 130" stroke="#94a3b8" stroke-width="3" fill="none" />
                        <path d="M ${oppWallX} 130 L ${oppWallX} 240" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round"/>
                        
                        <!-- Pared con el agujero lateral (tubo recto horizontal y más estrecho) -->
                        <path d="M ${wallX} 130 L ${wallX} ${tubeTopY} L ${tubeOuterX} ${tubeTopY}" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M ${tubeOuterX} ${tubeBotY} L ${wallX} ${tubeBotY} L ${wallX} 240" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        
                        <!-- Relleno semitransparente del tubo -->
                        <path d="${fillPath}" fill="rgba(255,255,255,0.4)" stroke="none" />
                        
                        <!-- Hilo de Platino (Pt) y placa (plateado) -->
                        <line x1="${cx}" y1="115" x2="${cx}" y2="210" stroke="#64748b" stroke-width="3" />
                        <rect x="${cx-10}" y="210" width="20" height="20" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5" rx="2" />
                        <text x="${cx + 14}" y="180" text-anchor="middle" font-size="13" fill="#475569" font-weight="bold">Pt</text>
                        
                        <!-- Entrada de gas lateral: Etiqueta y Flecha apuntando adentro -->
                        <text x="${tubeOuterX + dSign * 25}" y="${tubeMidY - 10}" font-size="20" font-weight="bold" fill="#64748b" text-anchor="middle">${element.gasLabel}</text>
                        <path d="M ${tubeOuterX + dSign * 45} ${tubeMidY} L ${tubeOuterX + dSign * 5} ${tubeMidY}" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>

                        <!-- Burbujas animadas de gas entrando por el lateral, bajando y saliendo a la disolución -->
                        <g>
                            <circle r="3" fill="${element.color}" />
                            <animateMotion dur="3.5s" begin="0s" repeatCount="indefinite" path="M ${tubeOuterX + dSign * 15} ${tubeMidY} L ${cx} ${tubeMidY} L ${cx} 235 C ${cx + 15} 250, ${cx + 35} 240, ${cx + 35} 140" />
                            <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.8;0.9;1" dur="3.5s" begin="0s" repeatCount="indefinite" />
                        </g>
                        <g>
                            <circle r="2" fill="${element.color}" />
                            <animateMotion dur="3s" begin="1s" repeatCount="indefinite" path="M ${tubeOuterX + dSign * 15} ${tubeMidY} L ${cx} ${tubeMidY} L ${cx} 230 C ${cx - 15} 245, ${cx - 35} 235, ${cx - 35} 130" />
                            <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.8;0.9;1" dur="3s" begin="1s" repeatCount="indefinite" />
                        </g>
                        <g>
                            <circle r="2.5" fill="${element.color}" />
                            <animateMotion dur="3.2s" begin="2s" repeatCount="indefinite" path="M ${tubeOuterX + dSign * 15} ${tubeMidY} L ${cx} ${tubeMidY} L ${cx} 238 C ${cx + 10} 255, ${cx + 28} 245, ${cx + 28} 120" />
                            <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.8;0.9;1" dur="3.2s" begin="2s" repeatCount="indefinite" />
                        </g>
                    `;
                } else if (element.type === 'aqueous') {
                    return `
                        <!-- Hilo de Platino (Pt) y placa para disolución (plateado) -->
                        <line x1="${cx}" y1="115" x2="${cx}" y2="230" stroke="#64748b" stroke-width="4" />
                        <rect x="${cx-15}" y="230" width="30" height="40" fill="#cbd5e1" stroke="#64748b" stroke-width="2" rx="2" />
                        <text x="${cx + 14}" y="200" text-anchor="middle" font-size="14" fill="#475569" font-weight="bold">Pt</text>
                    `;
                } else {
                    return `
                        <rect x="${cx-25}" y="120" width="50" height="130" fill="${element.color}" stroke="#334155" stroke-width="2" rx="4" />
                        <text x="${cx}" y="150" text-anchor="middle" font-size="18" font-weight="bold" fill="${element.color === '#778899' || element.color === '#696969' ? 'white' : 'black'}">${element.id}</text>
                    `;
                }
            };

            const html = `
                <svg width="100%" height="100%" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
                            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
                        </marker>
                        <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
                            <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
                        </marker>
                        <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
                            <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b" />
                        </marker>
                    </defs>

                    <!-- FONDOS Y MESAS -->
                    <line x1="50" y1="320" x2="750" y2="320" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>

                    <!-- CABLES -->
                    <path d="M 200 120 L 200 30 L 340 30" fill="none" stroke="#1e293b" stroke-width="4"/>
                    <path d="M 600 120 L 600 30 L 460 30" fill="none" stroke="#1e293b" stroke-width="4"/>
                    
                    <!-- FLUJO DE ELECTRONES (Paso 2+) -->
                    ${step >= 2 ? `
                        <path d="M 200 120 L 200 30 L 600 30 L 600 120" fill="none" stroke="#fbbf24" stroke-width="4" class="${electronClass}" />
                        <text x="270" y="20" text-anchor="middle" fill="#d97706" font-weight="bold" font-size="16">${isAnodeLeft ? 'e⁻ &rarr;' : '&larr; e⁻'}</text>
                        <text x="530" y="20" text-anchor="middle" fill="#d97706" font-weight="bold" font-size="16">${isAnodeLeft ? 'e⁻ &rarr;' : '&larr; e⁻'}</text>
                    ` : ''}

                    <!-- VOLTÍMETRO -->
                    <rect x="340" y="5" width="120" height="50" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="3" />
                    <text x="400" y="27" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="${vColor}">${voltmeterReading}</text>
                    <text x="400" y="45" text-anchor="middle" font-size="12" fill="#64748b">Voltímetro</text>

                    <!-- PUENTE SALINO -->
                    <!-- Tubo principal -->
                    <path d="M 280 200 L 280 140 A 50 50 0 0 1 330 90 L 470 90 A 50 50 0 0 1 520 140 L 520 200" fill="none" stroke="#f1f5f9" stroke-width="36" opacity="0.9"/>
                    <path d="M 280 200 L 280 140 A 50 50 0 0 1 330 90 L 470 90 A 50 50 0 0 1 520 140 L 520 200" fill="none" stroke="#cbd5e1" stroke-width="40" stroke-linecap="round" opacity="0.5"/>
                    <text x="400" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">Puente Salino (${currentCell.saltBridge.name})</text>

                    <!-- Animación Iones (Paso 3+) -->
                    ${step >= 3 ? `
                        <!-- Leyenda Iones bajo el puente salino -->
                        <g>
                            <circle cx="360" cy="165" r="14" fill="#ef4444" opacity="0.9"/>
                            <text x="360" y="169" text-anchor="middle" font-size="10" font-weight="bold" fill="white">${currentCell.saltBridge.cation}</text>
                            
                            <circle cx="440" cy="165" r="14" fill="#3b82f6" opacity="0.9"/>
                            <text x="440" y="169" text-anchor="middle" font-size="10" font-weight="bold" fill="white">${currentCell.saltBridge.anion}</text>
                        </g>

                        <!-- Cationes en movimiento (Rojos) -->
                        <g>
                            <circle r="10" fill="#ef4444" />
                            <text y="4" text-anchor="middle" font-size="12" font-weight="bold" fill="white">+</text>
                            <animateMotion dur="3s" repeatCount="indefinite" path="${isAnodeLeft ? 'M 400 90 L 470 90 A 50 50 0 0 1 520 140 L 520 190' : 'M 400 90 L 330 90 A 50 50 0 0 0 280 140 L 280 190'}" />
                            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" repeatCount="indefinite" />
                        </g>
                        <g>
                            <circle r="10" fill="#ef4444" />
                            <text y="4" text-anchor="middle" font-size="12" font-weight="bold" fill="white">+</text>
                            <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite" path="${isAnodeLeft ? 'M 400 90 L 470 90 A 50 50 0 0 1 520 140 L 520 190' : 'M 400 90 L 330 90 A 50 50 0 0 0 280 140 L 280 190'}" />
                            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="1.5s" repeatCount="indefinite" />
                        </g>

                        <!-- Aniones NO3- (Azules) -->
                        <g>
                            <circle r="10" fill="#3b82f6" />
                            <text y="4" text-anchor="middle" font-size="12" font-weight="bold" fill="white">-</text>
                            <animateMotion dur="3s" repeatCount="indefinite" path="${isAnodeLeft ? 'M 400 90 L 330 90 A 50 50 0 0 0 280 140 L 280 190' : 'M 400 90 L 470 90 A 50 50 0 0 1 520 140 L 520 190'}" />
                            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" repeatCount="indefinite" />
                        </g>
                        <g>
                            <circle r="10" fill="#3b82f6" />
                            <text y="4" text-anchor="middle" font-size="12" font-weight="bold" fill="white">-</text>
                            <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite" path="${isAnodeLeft ? 'M 400 90 L 330 90 A 50 50 0 0 0 280 140 L 280 190' : 'M 400 90 L 470 90 A 50 50 0 0 1 520 140 L 520 190'}" />
                            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="1.5s" repeatCount="indefinite" />
                        </g>
                    ` : ''}

                    <!-- TAPONES PUENTE SALINO -->
                    <path d="M 265 200 L 295 200" stroke="#94a3b8" stroke-width="10" opacity="0.8"/>
                    <path d="M 505 200 L 535 200" stroke="#94a3b8" stroke-width="10" opacity="0.8"/>

                    <!-- CUBETA IZQUIERDA -->
                    <path d="M 100 180 L 100 310 A 10 10 0 0 0 110 320 L 290 320 A 10 10 0 0 0 300 310 L 300 180" fill="rgba(186, 230, 253, 0.3)" stroke="#0284c7" stroke-width="4"/>
                    <!-- Líquido -->
                    <path d="M 102 200 L 298 200 L 298 310 A 8 8 0 0 1 290 318 L 110 318 A 8 8 0 0 1 102 310 Z" fill="${getLiquidColor(left)}" opacity="${getLiquidOpacity(left)}"/>
                    ${renderSolutionText(left, 200)}
                    
                    <!-- ELECTRODO IZQUIERDO -->
                    ${renderElectrode(left, 200, true)}

                    <!-- CUBETA DERECHA -->
                    <path d="M 500 180 L 500 310 A 10 10 0 0 0 510 320 L 690 320 A 10 10 0 0 0 700 310 L 700 180" fill="rgba(186, 230, 253, 0.3)" stroke="#0284c7" stroke-width="4"/>
                    <!-- Líquido -->
                    <path d="M 502 200 L 698 200 L 698 310 A 8 8 0 0 1 690 318 L 510 318 A 8 8 0 0 1 502 310 Z" fill="${getLiquidColor(right)}" opacity="${getLiquidOpacity(right)}"/>
                    ${renderSolutionText(right, 600)}

                    <!-- ELECTRODO DERECHO -->
                    ${renderElectrode(right, 600, false)}

                    <!-- ETIQUETAS ÁNODO/CÁTODO (Paso 1+) -->
                    ${step >= 1 ? `
                        <rect x="${isAnodeLeft ? 150 : 550}" y="340" width="100" height="30" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
                        <text x="${isAnodeLeft ? 200 : 600}" y="360" text-anchor="middle" font-weight="bold" fill="#b91c1c">ÁNODO (-)</text>

                        <rect x="${!isAnodeLeft ? 150 : 550}" y="340" width="100" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
                        <text x="${!isAnodeLeft ? 200 : 600}" y="360" text-anchor="middle" font-weight="bold" fill="#1d4ed8">CÁTODO (+)</text>
                    ` : ''}

                    <!-- FLECHAS DE REACCIÓN (Paso 4+) -->
                    ${(() => {
                        if (step < 4) return '';
                        
                        const renderArrows = (element, cx, isAnode, isLeftCell) => {
                            const arrowClass = isAnode ? 'reaction-arrow-red' : 'reaction-arrow-blue';
                            const markerId = isAnode ? 'arrowRed' : 'arrowBlue';
                            const labelText = isAnode ? 'Oxidación' : 'Reducción';
                            const labelColor = isAnode ? '#ef4444' : '#3b82f6';
                            let html = '';
                            const dSign = isLeftCell ? 1 : -1;
                            
                            if (element.type === 'aqueous') {
                                // Para elementos en disolución, flechas entre los dos iones y el electrodo de Pt
                                if (isAnode) { 
                                    // Oxidación: Red (der) -> Electrodo -> Ox (izq)
                                    html += `
                                        <path d="M ${cx + 40} 260 Q ${cx + 20} 245 ${cx + 15} 240" fill="none" stroke-width="2.5" class="${arrowClass}" marker-end="url(#${markerId})"/>
                                        <path d="M ${cx - 15} 240 Q ${cx - 20} 245 ${cx - 40} 260" fill="none" stroke-width="2.5" class="${arrowClass}" marker-end="url(#${markerId})"/>
                                    `;
                                } else { 
                                    // Reducción: Ox (izq) -> Electrodo -> Red (der)
                                    html += `
                                        <path d="M ${cx - 40} 260 Q ${cx - 20} 245 ${cx - 15} 240" fill="none" stroke-width="2.5" class="${arrowClass}" marker-end="url(#${markerId})"/>
                                        <path d="M ${cx + 15} 240 Q ${cx + 20} 245 ${cx + 40} 260" fill="none" stroke-width="2.5" class="${arrowClass}" marker-end="url(#${markerId})"/>
                                    `;
                                }
                            } else if (element.type === 'gas') {
                                // Determinar si la especie gaseosa (no iónica) es la oxidada o la reducida
                                const isOxGas = !element.ox.includes('<sup');
                                
                                // Lógica dinámica de dirección de flecha para gases
                                const arrowDown = isAnode ? !isOxGas : isOxGas;
                                
                                if (arrowDown) {
                                    // Flecha baja: Del electrodo de Pt/gas hacia la disolución
                                    html += `<path d="M ${cx + dSign*12} 225 Q ${cx + dSign*35} 245 ${cx + dSign*15} 265" fill="none" stroke-width="2.5" class="${arrowClass}" marker-end="url(#${markerId})"/>`;
                                } else {
                                    // Flecha sube: De la disolución (ion) hacia el electrodo de Pt
                                    html += `<path d="M ${cx + dSign*15} 265 Q ${cx + dSign*35} 245 ${cx + dSign*12} 225" fill="none" stroke-width="2.5" class="${arrowClass}" marker-end="url(#${markerId})"/>`;
                                }
                            } else {
                                // Flecha genérica para electrodos sólidos
                                if (isAnode) {
                                    // Ánodo (oxidación): del metal sólido a la disolución (ion) con más curvatura
                                    html += `<path d="M ${cx + dSign*25} 210 Q ${cx + dSign*60} 245 ${cx + dSign*15} 260" fill="none" stroke-width="2.5" class="${arrowClass}" marker-end="url(#${markerId})"/>`;
                                } else {
                                    // Cátodo (reducción): de la disolución (ion) al metal sólido con más curvatura
                                    html += `<path d="M ${cx + dSign*15} 260 Q ${cx + dSign*60} 245 ${cx + dSign*25} 210" fill="none" stroke-width="2.5" class="${arrowClass}" marker-end="url(#${markerId})"/>`;
                                }
                            }
                            
                            html += `<text x="${cx}" y="390" text-anchor="middle" fill="${labelColor}" font-size="15" font-weight="bold">${labelText}</text>`;
                            return html;
                        };
                        
                        return renderArrows(left, 200, isAnodeLeft, true) + renderArrows(right, 600, !isAnodeLeft, false);
                    })()}
                </svg>
            `;

            document.getElementById('svg-container').innerHTML = html;
        }

        // Arrancar la simulación
        window.onload = init;
    </script>
</body>
</html>
